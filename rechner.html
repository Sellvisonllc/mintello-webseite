<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROI-Rechner | Klara von Mintello</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
    background:linear-gradient(160deg,#0D1B2A 0%,#14243a 50%,#0D1B2A 100%);
    color:#1A2233;
    min-height:100vh;
    padding:48px 16px;
    display:flex;
    justify-content:center;
  }
  .wrap{width:100%;max-width:540px;}
  .logo-row{text-align:center;margin-bottom:28px;}
  .logo-row .brand{font-size:22px;font-weight:700;color:#fff;}
  .logo-row .sub{font-size:14px;color:#9AA6B2;margin-top:6px;}
  .card{
    background:#FFFFFF;
    border-radius:16px;
    padding:32px 28px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
  }
  h1{font-size:20px;font-weight:700;color:#0D1B2A;margin-bottom:8px;}
  .intro{font-size:14px;color:#5A6472;margin-bottom:26px;line-height:1.55;}
  label{font-size:14px;font-weight:600;color:#2C3444;display:block;margin-bottom:8px;}
  input[type="number"]{
    width:100%;padding:13px 14px;font-size:16px;
    border:1.5px solid #D3D8E0;border-radius:8px;margin-bottom:26px;color:#1A2233;
  }
  input[type="number"]:focus{outline:none;border-color:#3E8ED9;}
  .results{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
  .stat{background:#F0F6FC;border-radius:10px;padding:18px 16px;}
  .stat .label{font-size:12px;color:#5A6472;margin-bottom:6px;}
  .stat .value{font-size:26px;font-weight:700;color:#3E8ED9;}
  .disclaimer{font-size:11px;color:#8A93A3;line-height:1.5;margin:16px 0 26px;}
  .email-section{border-top:1px solid #E2E5EA;padding-top:22px;}
  input[type="email"], input[type="text"]{
    width:100%;padding:12px 14px;font-size:15px;
    border:1.5px solid #D3D8E0;border-radius:8px;margin-bottom:12px;
  }
  button{
    width:100%;background:#3E8ED9;color:#fff;border:none;
    padding:13px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;
  }
  button:hover{background:#2E76B8;}
  .footer-note{text-align:center;font-size:12px;color:#9AA6B2;margin-top:22px;}
  .success{display:none;text-align:center;padding:20px 0;}
  .success.show{display:block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="brand">Klara von Mintello</div>
    <div class="sub">Automatisierte Dienstplanung für Pflegeeinrichtungen</div>
  </div>

  <div class="card">
    <div id="form-view">
      <h1>Wie viel Zeit
